
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeyko Crypto Mining</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #12011a; color: white; text-align: center; margin: 0; padding: 20px; }
        .card { background: #1e0229; border: 1px solid #d48806; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .btn-confirm { background-color: #9c106b; color: white; border: none; padding: 10px 20px; border-radius: 20px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        input { width: 80%; padding: 10px; border-radius: 10px; border: none; margin-top: 10px; text-align: center; }
        .locked { opacity: 0.5; border: 1px solid #555; }
    </style>
</head>
<body>

    <h2>💎 Interface de Minage VIP</h2>

    <div class="card"><h3>VIP 1</h3><p>Prix: 6 USDT</p><button class="btn-confirm" onclick="openDepot(6)">MINER</button></div>
    <div class="card"><h3>VIP 2</h3><p>Prix: 10 USDT</p><button class="btn-confirm" onclick="openDepot(10)">MINER</button></div>
    <div class="card"><h3>VIP 3</h3><p>Prix: 20 USDT</p><button class="btn-confirm" onclick="openDepot(20)">MINER</button></div>
    <div class="card"><h3>VIP 4</h3><p>Prix: 45 USDT</p><button class="btn-confirm" onclick="openDepot(45)">MINER</button></div>
    <div class="card"><h3>VIP 5</h3><p>Prix: 80 USDT</p><button class="btn-confirm" onclick="openDepot(80)">MINER</button></div>
    <div class="card"><h3>VIP 6</h3><p>Prix: 150 USDT</p><button class="btn-confirm" onclick="openDepot(150)">MINER</button></div>
    <div class="card"><h3>VIP 7</h3><p>Prix: 300 USDT</p><button class="btn-confirm" onclick="openDepot(300)">MINER</button></div>

    <div class="card locked"><h3>VIP 8</h3><p>Bientôt disponible</p></div>
    <div class="card locked"><h3>VIP 9</h3><p>Bientôt disponible</p></div>

    <hr>
    <h3>📥 Effectuer un Dépôt</h3>
    <div class="card">
        <input type="number" id="montant_input" placeholder="Montant en USDT">
        <button class="btn-confirm" onclick="sendDepot()">CONFIRMER LE DÉPÔT</button>
    </div>

    <script>
        // Pou voye montan depo a bay bot la
        function sendDepot() {
            let montant = document.getElementById('montant_input').value;
            if(!montant || montant <= 0) { alert("Saisir un montant"); return; }
            window.location.href = "https://t.me/QeykoMiningBot?start=depot_" + montant;
        }

        // Pou bouton MINER yo (voye moun nan dirèk nan depo)
        function openDepot(prix) {
            window.location.href = "https://t.me/QeykoMiningBot?start=depot_" + prix;
        }
    </script>
</body>
</html>
