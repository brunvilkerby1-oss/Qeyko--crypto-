<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeyko Mining</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #0b0c0e; color: #fff; margin: 0; padding-bottom: 80px; }
        .gold { color: #f3ba2f; }
        .page { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .active-page { display: block; }
        .balance-card { background: #161a1e; border: 1px solid #f3ba2f; border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 15px; }
        .card { background: #1e2329; border-radius: 10px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2b3139; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #161a1e; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #2b3139; }
        .nav-item { color: #848e9c; text-align: center; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: #f3ba2f; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .btn-miner { background: #f3ba2f; color: #000; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .input-box { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #474d57; background: #0b0c0e; color: #fff; box-sizing: border-box; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="p-home" class="page active-page">
        <div class="balance-card">
            <div style="font-size: 13px; color: #848e9c;">Solde Total</div>
            <div style="font-size: 32px; font-weight: bold;" class="gold"><span id="bal">0.00</span> <small>USDT</small></div>
        </div>
        <div class="card">
            <div><b>Profit journalier</b><br><small class="gold" id="profit">+0.00 USDT</small></div>
            <i class="fas fa-chart-line gold" style="font-size: 24px;"></i>
        </div>
        <h3 style="font-size: 16px;">Dépôt Rapide (BEP20)</h3>
        <div style="background: #1e2329; padding: 10px; border-radius: 8px; font-size: 11px; word-break: break-all; margin-bottom: 10px; border: 1px dashed #f3ba2f;">
            <span id="addr">0x7fD50dAAfeA0a8Df3E4860ECC81939fFBaa11396</span>
            <button onclick="copy()" style="float:right; background:#f3ba2f; border:none; padding:2px 5px; border-radius:3px; font-size:10px;">Copier</button>
        </div>
        <input type="number" id="depAmt" class="input-box" placeholder="Montant déposé">
        <button class="btn-miner" style="width:100%; padding:12px;" onclick="doDep()">Valider Dépôt</button>
    </div>

    <div id="p-vip" class="page">
        <h2 class="gold">Packs de Minage</h2>
        <div class="card"><div>VIP 1 (6$)</div><div class="gold">+0.60$/j</div><button class="btn-miner" onclick="buy(6)">Miner</button></div>
        <div class="card"><div>VIP 2 (10$)</div><div class="gold">+1.20$/j</div><button class="btn-miner" onclick="buy(10)">Miner</button></div>
        <div class="card"><div>VIP 3 (20$)</div><div class="gold">+2.50$/j</div><button class="btn-miner" onclick="buy(20)">Miner</button></div>
    </div>

    <div id="p-mine" class="page" style="text-align: center;">
        <h2 class="gold">Bassin Minier</h2>
        <div style="font-size: 70px; margin: 30px 0;"><i class="fas fa-hammer gold"></i></div>
        <div class="balance-card">
            <div class="gold" style="font-size: 22px;">Minage en cours...</div>
            <small id="timer">Récupération dans 24h</small>
        </div>
    </div>

    <div id="p-moi" class="page">
        <h2 class="gold">Portail Retrait</h2>
        <input type="text" id="retAddr" class="input-box" placeholder="Votre adresse BEP20">
        <input type="number" id="retAmt" class="input-box" placeholder="Montant à retirer">
        <button class="btn-miner" style="width:100%; padding:12px; background:#0b0c0e; color:#f3ba2f; border:1px solid #f3ba2f;" onclick="doRet()">Demander Retrait</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="show('p-home', this)"><i class="fas fa-home"></i>Maison</div>
        <div class="nav-item" onclick="show('p-vip', this)"><i class="fas fa-crown"></i>VIP</div>
        <div class="nav-item" onclick="show('p-mine', this)"><i class="fas fa-microchip"></i>Mining</div>
        <div class="nav-item" onclick="show('p-moi', this)"><i class="fas fa-user-shield"></i>Retrait</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('bal').innerText = urlParams.get('balance') || "0.00";

        function show(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
        function copy() {
            navigator.clipboard.writeText(document.getElementById('addr').innerText);
            tg.showAlert("Adresse copiée ! ✅");
        }
        function buy(v) { tg.openTelegramLink("https://t.me/qeykominingbot?start=depot_" + v); tg.close(); }
        function doDep() {
            let a = document.getElementById('depAmt').value;
            if(a > 0) { tg.openTelegramLink("https://t.me/qeykominingbot?start=depot_" + a); tg.close(); }
        }
        function doRet() {
            let ad = document.getElementById('retAddr').value;
            let am = document.getElementById('retAmt').value;
            if(ad && am > 0) { tg.openTelegramLink("https://t.me/qeykominingbot?start=retrait_" + am + "_" + ad); tg.close(); }
        }
    </script>
</body>
</html>
