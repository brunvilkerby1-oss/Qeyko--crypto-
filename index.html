<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeyko Mining - Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #000000; color: #ffffff; margin: 0; padding: 15px; }
        .gold { color: #ffcc00; }
        
        /* Bwat Balans lan */
        .balance-card { background: linear-gradient(135deg, #1a1a1a 0%, #333 100%); border: 2px solid #ffcc00; border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(255, 204, 0, 0.2); }
        .balance-card h2 { margin: 0; font-size: 14px; color: #aaaaaa; text-transform: uppercase; }
        .balance-amount { font-size: 32px; font-weight: bold; color: #ffcc00; margin: 5px 0; }

        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .vip-info h3 { margin: 0; font-size: 16px; color: #ffcc00; }
        .vip-info p { margin: 2px 0; font-size: 12px; color: #aaaaaa; }
        .btn { background: #ffcc00; color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .section-title { border-left: 4px solid #ffcc00; padding-left: 10px; margin: 20px 0 10px; font-size: 18px; font-weight: bold; }
        .deposit-box { background: #111; border: 2px dashed #ffcc00; padding: 15px; border-radius: 12px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ffcc00; background: #000; color: #fff; text-align: center; font-size: 16px; }
        .btn-main { width: 100%; padding: 15px; font-size: 16px; margin-top: 5px; }
        .btn-retrait { background: transparent; border: 1px solid #ffcc00; color: #ffcc00; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="balance-card">
        <h2>Solde Actuel</h2>
        <div class="balance-amount"><span id="user-balance">0.00</span> <small style="font-size: 15px;">USDT</small></div>
    </div>

    <div class="section-title">PACKS DE MINAGE</div>
    <div class="card"><div class="vip-info"><h3>VIP 1</h3><p>6 USDT | <span class="gold">+0.60$/jour</span></p></div><button class="btn" onclick="send(6)">MINER</button></div>
    <div class="card"><div class="vip-info"><h3>VIP 2</h3><p>10 USDT | <span class="gold">+1.20$/jour</span></p></div><button class="btn" onclick="send(10)">MINER</button></div>
    <div class="card"><div class="vip-info"><h3>VIP 3</h3><p>20 USDT | <span class="gold">+2.50$/jour</span></p></div><button class="btn" onclick="send(20)">MINER</button></div>
    <div class="card"><div class="vip-info"><h3>VIP 4</h3><p>45 USDT | <span class="gold">+6.00$/jour</span></p></div><button class="btn" onclick="send(45)">MINER</button></div>

    <div class="section-title">PORTAIL FINANCIER</div>
    <div class="deposit-box">
        <input type="number" id="amt" placeholder="Montant Dépôt">
        <button class="btn btn-main" onclick="manual()">CONFIRMER DÉPÔT</button>
        <button class="btn btn-main btn-retrait" onclick="retrait()">DEMANDER UN RETRAIT</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Rekipere balans ki nan lyen an
        const urlParams = new URLSearchParams(window.location.search);
        const balance = urlParams.get('balance') || "0.00";
        document.getElementById('user-balance').innerText = balance;

        function send(v) { window.location.href = "https://t.me/QeykoMiningBot?start=depot_" + v; }
        function manual() { 
            let a = document.getElementById('amt').value;
            if(a > 0) window.location.href = "https://t.me/QeykoMiningBot?start=depot_" + a;
            else alert("Entrez un montant");
        }
        function retrait() { window.location.href = "https://t.me/QeykoMiningBot?start=retrait"; }
    </script>
</body>
</html>
