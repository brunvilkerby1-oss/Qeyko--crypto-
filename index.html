<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeyko Crypto Mining</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #12011a; color: white; text-align: center; padding: 20px; }
        .card { background: #1e0229; border: 1px solid #d48806; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .btn-confirm { background-color: #9c106b; color: white; border: none; padding: 10px; border-radius: 20px; width: 100%; cursor: pointer; font-weight: bold; }
        input { width: 80%; padding: 10px; border-radius: 10px; border: none; margin-bottom: 10px; text-align: center; }
        .locked { opacity: 0.5; }
    </style>
</head>
<body>
    <h2>💎 VIP MINING SYSTEM</h2>
    <div class="card"><h3>VIP 1</h3><p>6 USDT</p><button class="btn-confirm" onclick="go(6)">MINER</button></div>
    <div class="card"><h3>VIP 2</h3><p>10 USDT</p><button class="btn-confirm" onclick="go(10)">MINER</button></div>
    <div class="card"><h3>VIP 3</h3><p>20 USDT</p><button class="btn-confirm" onclick="go(20)">MINER</button></div>
    <div class="card"><h3>VIP 4</h3><p>45 USDT</p><button class="btn-confirm" onclick="go(45)">MINER</button></div>
    <div class="card"><h3>VIP 5</h3><p>80 USDT</p><button class="btn-confirm" onclick="go(80)">MINER</button></div>
    <div class="card"><h3>VIP 6</h3><p>150 USDT</p><button class="btn-confirm" onclick="go(150)">MINER</button></div>
    <div class="card"><h3>VIP 7</h3><p>300 USDT</p><button class="btn-confirm" onclick="go(300)">MINER</button></div>
    <div class="card locked"><h3>VIP 8</h3><p>Bientôt...</p></div>
    <div class="card locked"><h3>VIP 9</h3><p>Bientôt...</p></div>

    <div class="card">
        <input type="number" id="m_input" placeholder="Montant USDT">
        <button class="btn-confirm" onclick="goManual()">CONFIRMER LE DÉPÔT</button>
    </div>

    <script>
        function go(p) {
            window.location.href = "https://t.me/QeykoMiningBot?start=depot_" + p;
        }
        function goManual() {
            let v = document.getElementById('m_input').value;
            if(v > 0) { window.location.href = "https://t.me/QeykoMiningBot?start=depot_" + v; }
            else { alert("Saisir un montant"); }
        }
    </script>
</body>
</html>
