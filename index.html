<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qeyko Mining App</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #12010d; font-family: 'Segoe UI', sans-serif; 
            color: white; margin: 0; padding: 15px; text-align: center; padding-bottom: 100px;
        }
        .balance-box { 
            background: linear-gradient(145deg, #9c126d, #6a0b4a); 
            padding: 25px 15px; border-radius: 25px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .btn-group { display: flex; gap: 8px; margin-top: 15px; }
        .btn-main { flex: 1; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; font-size: 13px; }
        
        /* Modal Style (Full Screen Form) */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; display: none; flex-direction: column; z-index: 1000; color: #333; padding: 20px; overflow-y: auto;
        }
        .form-header { display: flex; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .back-btn { font-size: 24px; cursor: pointer; margin-right: 15px; color: #9c126d; }
        .net-btn { border: 2px solid #f39c12; background: #fff9f0; color: #e67e22; padding: 12px; border-radius: 10px; font-weight: bold; text-align: center; margin: 10px 0; }
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { font-weight: bold; display: block; margin-bottom: 8px; font-size: 14px; color: #555; }
        .input-field { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; background: #f9f9f9; font-size: 14px; outline: none; }
        .confirm-btn { width: 100%; padding: 18px; background: #9c126d; color: white; border: none; border-radius: 30px; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; }

        /* VIP Cards */
        .vip-card { background: white; border-radius: 20px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; color: #333; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .vip-info b { font-size: 18px; color: #9c126d; }
        .btn-miner { background: #9c126d; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 500; }
        .nav-item { color: #666; font-size: 11px; cursor: pointer; text-align: center; }
        .nav-item.active { color: #f1c40f; font-weight: bold; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <div id="page-mine" class="page active">
        <h3 style="margin-top: 0;">Qeyko Crypto 🚀</h3>
        <div class="balance-box">
            <small style="opacity: 0.8;">SOLDE ACTUEL (PROFIT)</small>
            <h2 id="balance" style="font-size: 36px; margin: 10px 0;">0.00 USDT</h2>
            <div class="btn-group">
                <button class="btn-main" style="background:#27ae60;" onclick="openForm('m-depot')">📥 DÉPÔT</button>
                <button class="btn-main" style="background:#f1c40f; color:#333;" onclick="openForm('m-retrait')">📤 RETRAIT</button>
                <button class="btn-main" style="background:#3498db;" onclick="showPage('page-squad')">👥 INVITER</button>
            </div>
        </div>

        <div class="vip-list">
            <div class="vip-card"><div><b>VIP 1</b><p style="color:#27ae60; margin:0;">+1.00 USDT / 24h</p></div><div style="text-align:right"><b>$6.00</b><br><button class="btn-miner">MINER</button></div></div>
