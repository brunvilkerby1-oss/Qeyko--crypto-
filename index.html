<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeyko Crypto</title>
    <style>
        body { background: #9c126d; font-family: sans-serif; color: white; margin: 0; padding: 15px; }
        .header { text-align: center; margin-bottom: 20px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; color: #333; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .name { font-weight: bold; color: #9c126d; font-size: 18px; }
        .profit { color: #27ae60; font-size: 13px; font-weight: bold; }
        .btn { background: #9c126d; color: white; border: none; padding: 10px 18px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Qeyko Crypto</h1>
        <p>Solde: <span id="balance">0.00</span> USDT</p>
        <button class="btn" style="background: gold; color: black;" onclick="checkRetrait()">RETIRER</button>
    </div>

    <div class="card">
        <div><div class="name">VIP 1</div><div class="profit">+$1.00 / jour</div></div>
        <div style="text-align: right;"><div style="font-weight: bold;">$6.00</div><button class="btn" onclick="alert('Minage activé!')">MINER</button></div>
    </div>

    <div class="card">
        <div><div class="name">VIP 2</div><div class="profit">+$2.50 / jour</div></div>
        <div style="text-align: right;"><div style="font-weight: bold;">$12.00</div><button class="btn" onclick="alert('Minage activé!')">MINER</button></div>
    </div>

    <div class="card">
        <div><div class="name">VIP 3</div><div class="profit">+$4.00 / jour</div></div>
        <div style="text-align: right;"><div style="font-weight: bold;">$20.00</div><button class="btn" onclick="alert('Minage activé!')">MINER</button></div>
    </div>

    <div class="card">
        <div><div class="name">VIP 4</div><div class="profit">+$5.50 / jour</div></div>
        <div style="text-align: right;"><div style="font-weight: bold;">$25.00</div><button class="btn" onclick="alert('Minage activé!')">MINER</button></div>
    </div>

    <div class="card">
        <div><div class="name">VIP 5</div><div class="profit">+$6.20 / jour</div></div>
        <div style="text-align: right;"><div style="font-weight: bold;">$28.00</div><button class="btn" onclick="alert('Minage activé!')">MINER</button></div>
    </div>

    <div class="card" style="border: 2px solid gold;">
        <div><div class="name">VIP 6 🚀</div><div class="profit">+$7.00 / jour</div></div>
        <div style="text-align: right;"><div style="font-weight: bold;">$30.00</div><button class="btn" onclick="alert('Minage activé!')">MINER</button></div>
    </div>

    <script>
        let retrait_autorise = true; 
        function checkRetrait() {
            if (retrait_autorise === false) {
                alert("⚠️ Attention: Les retraits sont temporairement suspendus.");
            } else {
                alert("Formulaire de retrait en cours...");
            }
        }
    </script>
</body>
</html>
